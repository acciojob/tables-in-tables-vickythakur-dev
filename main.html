<!DOCTYPE html>
<html>
<head>
  <title>Nested Tables</title>
</head>

<body>

<table border="2" width="100%" cellspacing="10" cellpadding="10">

  <tr>

    <td>
      <table border="1" width="100%">
        <caption><b>Nested Table 2</b></caption>
        <tr>
          <th>Column 1</th>
          <th>Column 2</th>
        </tr>
        <tr>
          <td>abc</td>
          <td>def</td>
        </tr>
      </table>
    </td>

  
    <td>
      <table border="1" width="100%">
        <caption><b>Nested Table 1</b></caption>
        <tr>
          <td>
            <ul>
              <li>List item</li>
              <li>List item</li>
              <li>List item</li>
            </ul>
          </td>
        </tr>
      </table>
    </td>

  </tr>

  <tr>

   
    <td>
      <table border="1" width="100%">
        <caption><b>Nested Table 3</b></caption>
        <tr>
          <td>
            <a href="#">Nested Table</a>
          </td>
          <td>Demo Continued</td>
        </tr>
      </table>
    </td>

  
    <td>
      <table border="1" width="100%">
        <caption><b>Nested Table 4</b></caption>
        <tr>
          <td style="background-color:black; color:white; text-align:center;">
            HTML
          </td>
        </tr>
      </table>
    </td>

  </tr>

</table>

</body>
</html>
